<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom Css -->
    <link rel="stylesheet" href="./style.css">

    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- Navbar -->
<!-- Navbar -->
    <div class="mx-auto max-w-[1140px] px-4">

        <div class="navbar bg-base-100 min-h-[78px] flex-col gap-4 py-4 md:flex-row md:gap-0 md:py-0">

            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <svg height="32" viewBox="0 0 16 16" width="32" class="fill-current">
                        <path
                            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
                        </path>
                    </svg>
                    <span class="text-xl font-bold tracking-tight text-[#1f2937]">GitHub Issues Tracker</span>
                </div>
            </div>

            <div class="flex-none w-full md:w-auto flex flex-col md:flex-row gap-3">

                <div class="relative w-full md:w-72">
                    <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                        <img src="./assets/MagnifyingGlass.png" alt="">
                    </div>
                    <input id="search-input" type="text" placeholder="Search issues..."
                        class="input input-bordered w-full pl-10 bg-white focus:outline-none" />
                </div>

                <button id="search-btn"
                    class="btn border-none bg-[#4f00ff] hover:bg-[#4000d0] text-white">Search</button>
            </div>
        </div>
    </div>

        <!-- Container -->
    <div class="container mx-auto px-4 md:px-0 max-w-[1110px]">
        <!-- Tab bar -->
        <div class="mx-auto mt-6 w-full max-w-[1110px] rounded-xl border border-gray-100 bg-white shadow-sm">

            <div class="flex h-[88px] w-full items-center px-6 overflow-x-auto no-scrollbar">

                <div class="flex gap-3">

                    <button id="btn-all"
                        class="btn border-gray-200 bg-white hover:bg-gray-50 text-gray-600 min-w-[100px] font-medium capitalize">
                        All
                    </button>

                    <button id="btn-open"
                        class="btn border-gray-200 bg-white hover:bg-gray-50 text-gray-600 min-w-[100px] font-medium capitalize">
                        Open
                    </button>

                    <button id="btn-closed"
                        class="btn border-gray-200 bg-white hover:bg-gray-50 text-gray-600 min-w-[100px] font-medium capitalize">
                        Closed
                    </button>

                </div>

            </div>
        </div>

        <!-- Issues bar -->
        <div class="mt-4 flex items-center justify-between p-4 bg-white border-b border-gray-200 rounded-xl">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                    <!-- This is a placeholder for the icon. You would replace this with an actual SVG icon. -->
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 id="issue-count" class="text-lg font-semibold text-gray-800">50 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <div class="flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                    <span class="text-gray-700">Open</span>
                </div>
                <div class="flex items-center">
                    <span class="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>
                    <span class="text-gray-700">Closed</span>
                </div>
            </div>
        </div>

        <div class="card-container bg[#FBFBFB] shadow-sm">

            <div class="p-6 bg-slate-50 min-h-screen pt-6">

                <!-- Loading spinner -->
                <div id="loading-spinner" class="hidden flex justify-center items-center py-20">
                    <span class="loading loading-spinner loading-lg text-primary"></span>
                </div>

                <!-- Card  -->
                <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

                    <!-- Card section -->



                </div>

            </div>


        </div>

        <!-- Modal section -->
        <input type="checkbox" id="issue-modal" class="modal-toggle" />
        <div class="modal" role="dialog">
            <div class="modal-box max-w-2xl bg-white p-0 overflow-hidden" id="modal-content">
            </div>
            <label class="modal-backdrop" for="issue-modal">Close</label>
        </div>

    </div>


<!-- Script file -->
<script src="./script/script.js"></script>
</body>

</html>
