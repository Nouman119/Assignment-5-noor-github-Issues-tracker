<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom Css -->
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <div class="min-h-screen flex items-center justify-center bg-base-200 p-4">

        <!-- =========== Main Container =============== -->
        <div class="card w-full max-w-[520px] bg-base-100 shadow-xl p-8 border border-base-300">

            <div class="flex flex-col items-center mb-8">
                <div class="w-24 h-24 mb-4">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                        <path
                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-slate-800">GitHub Issues Tracker</h1>
                <p class="text-slate-500 mt-2">Sign in to manage your issues</p>
            </div>

            <!-- Form area -->
            <div class="form-control w-full space-y-4">

                <div>
                    <label class="label">
                        <span class="label-text font-bold text-base">Username</span>
                    </label>
                    <input type="text" placeholder="Enter Username" class="input input-bordered w-full"
                        id="username-input" />
                    <label class="label py-1">
                        <span class="label-text-alt text-primary">Default: admin</span>
                    </label>
                </div>

                <div>
                    <label class="label">
                        <span class="label-text font-bold text-base">Password</span>
                    </label>
                    <input type="password" placeholder="Enter Password" class="input input-bordered w-full"
                        id="password-input" />
                    <label class="label py-1">
                        <span class="label-text-alt text-primary">Default: admin123</span>
                    </label>
                </div>

                <button class="btn btn-primary w-full text-lg normal-case mt-4" id="login-btn">
                    Sign In
                </button>

            </div>

            <div class="divider my-8 text-slate-400 font-medium">OR</div>

            <div class="bg-base-200 rounded-xl p-6 text-center">
                <p class="text-slate-500 mb-2">Demo Credentials:</p>
                <div class="space-y-1">
                    <p class="text-slate-800 font-medium">
                        <span class="font-bold">Username:</span> admin
                    </p>
                    <p class="text-slate-800 font-medium">
                        <span class="font-bold">Password:</span> admin123
                    </p>
                </div>
            </div>

        </div>
    </div>


    <!-- Script -->
    <script src="./script/login.js"></script>
</body>

</html>
